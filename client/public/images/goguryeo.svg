<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goguryeo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="50%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#goguryeo-grad)" stroke-width="3"/>
  
  <!-- 삼족오 (세 발 까마귀) - 고구려의 상징 -->
  <g transform="translate(100,100)" filter="url(#glow)">
    <!-- 태양 -->
    <circle cx="0" cy="0" r="35" fill="#FFD700" opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="#FFA500" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#FF6B00"/>
    
    <!-- 까마귀 몸통 -->
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#1a1a1a"/>
    
    <!-- 머리 -->
    <circle cx="15" cy="-8" r="10" fill="#1a1a1a"/>
    <circle cx="20" cy="-10" r="3" fill="#FFD700"/> <!-- 눈 -->
    <path d="M 25,-8 L 35,-5 L 25,-5 Z" fill="#FF6B00"/> <!-- 부리 -->
    
    <!-- 날개 -->
    <path d="M -5,-5 Q -40,-30 -30,-50 Q -15,-35 5,-15 Z" fill="#2a2a2a"/>
    <path d="M -5,5 Q -45,15 -50,40 Q -25,25 0,10 Z" fill="#2a2a2a"/>
    
    <!-- 세 개의 다리 -->
    <g stroke="#1a1a1a" stroke-width="3" fill="none">
      <path d="M 0,15 L 0,45 L -10,55 M 0,45 L 10,55"/>
      <path d="M -10,12 L -25,40 L -35,45 M -25,40 L -20,50"/>
      <path d="M 10,12 L 25,40 L 35,45 M 25,40 L 20,50"/>
    </g>
  </g>
  
  <!-- 장식 테두리 -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#DC143C" stroke-width="1" stroke-dasharray="5,5"/>
</svg>
































